<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VSTerm Simulation</title>

<style>
/* Terminal-like style for VSTerm simulation */
body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    padding:40px;
}

.vsterm-console {
    width: 900px;
    font-family: Consolas, "Courier New", monospace;
    background-color: #eee3e3;
    color: #0d0d0d;
    white-space: pre;
    padding: 5px;
    line-height: 1.2em;
    font-size: 14px;
    border: 2px solid #000;
    overflow-x: auto;
}

.vsterm-highlight {
    width: 100%;
    box-sizing: border-box;
    background-color: #800080;
    color: #FFFF00;
    padding: 15px;
    font-size: 15px;
    white-space: pre;
}

.prompt{
    color:#00FF00;
}
</style>

</head>

<body>

<div class="vsterm-console">
 VSTERM32 - Host Terminal for Windows
 File   Edit     Options     Tools   Window  Help   L5CG902493S

<div class="vsterm-highlight">
<span class="prompt">&gt;LOG/A/037915/PD&lt;&gt;</span>
&lt;ENTER PASSWORD&gt;
***********
</div>

</div>

</body>
</html>
